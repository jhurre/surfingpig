<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Endless Runner - Tracking Camera</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 20px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            pointer-events: auto;
        }

        .score-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #444;
            min-width: 120px;
        }

        #coin-count {
            color: #ffd700;
        }

        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }

        #screen-overlay.hidden {
            display: none;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #ff4757;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }

        p {
            font-size: 18px;
            margin-bottom: 25px;
            color: #ccc;
        }

        .btn {
            background: #2ed573;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
        }

        .btn:hover {
            background: #26af5f;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border-radius: 20px;
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="hud">
            <div class="score-box">Score: <span id="score-val">0</span></div>
            <div class="score-box">Coins: <span id="coin-count">0</span></div>
        </div>
        
        <div id="controls-hint">Use Left / Right Arrows to switch lanes. Spacebar to Jump.</div>
    </div>

    <div id="screen-overlay">
        <h1 id="main-title">SUBWAY RUNNER</h1>
        <p id="sub-title">Avoid the red blocks, grab the gold cylinders!</p>
        <button id="action-btn" class="btn" onclick="startGame()">START GAME</button>
    </div>

			loader.load(base64Image, (texture) => {
				// Disable mipmaps to keep the flat image sharp
				texture.minFilter = THREE.LinearFilter;
				texture.generateMipmaps = false;
				
				scene.background = texture;
			});
			
            //scene.background = new THREE.Color(0x1a1a24);
            //scene.fog = new THREE.FogExp2(0x76C66D, 0.005);
			scene.fog = new THREE.Fog( 0x76C66D, 50, 80);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Initial positioning matches offset values directly behind the central player
            camera.position.set(cameraOffset.x, cameraOffset.y, cameraOffset.z);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);

            buildEnvironment();

            const playerGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.8, 16);
            const playerMat = new THREE.MeshStandardMaterial({ color: 0x00a8ff, roughness: 0.3 });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 0.9, 0);
            player.castShadow = true;
            scene.add(player);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', handleKeyDown);
        }

        function buildEnvironment() {
            for (let i = 0; i < 4; i++) {
                createTrackSegment(-i * 40);
            }
        }

        function createTrackSegment(zPos) {
            const segmentGroup = new THREE.Group();

            const roadGeo = new THREE.BoxGeometry(10, 0.2, 40);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x2f3542, roughness: 0.8 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.position.set(0, -0.1, 0);
            road.receiveShadow = true;
            segmentGroup.add(road);

            const markerMat = new THREE.MeshStandardMaterial({ color: 0x747d8c });
            for (let z = -15; z <= 15; z += 10) {
                const markerLeft = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.22, 3), markerMat);
                markerLeft.position.set(-1.5, 0, z);
                const markerRight = markerLeft.clone();
                markerRight.position.x = 1.5;
                segmentGroup.add(markerLeft, markerRight);
            }

            segmentGroup.position.z = zPos;
            scene.add(segmentGroup);
            trackSegments.push(segmentGroup);
        }

        function startGame() {
            obstacles.forEach(o => scene.remove(o));
            activeCoins.forEach(c => scene.remove(c));
            obstacles = [];
            activeCoins = [];
            
            score = 0;
            coins = 0;
            gameSpeed = 0.2;
            currentLane = 1;
            targetX = LANES[currentLane];
            player.position.set(targetX, 0.9, 0);
            
            // Instantly snap the camera back to center positions on restart
            camera.position.set(targetX + cameraOffset.x, cameraOffset.y, cameraOffset.z);
            camera.lookAt(targetX, 1.5, -5);

            document.getElementById('score-val').innerText = '0';
            document.getElementById('coin-count').innerText = '0';
            document.getElementById('screen-overlay').classList.add('hidden');
            
            isPlaying = true;
        }

        function gameOver() {
            isPlaying = false;
            document.getElementById('main-title').innerText = "GAME OVER";
            document.getElementById('sub-title').innerText = `Final Score: ${Math.floor(score)} | Coins Gathered: ${coins}`;
            document.getElementById('action-btn').innerText = "TRY AGAIN";
            document.getElementById('screen-overlay').classList.remove('hidden');
        }

        function handleKeyDown(e) {
            if (!isPlaying) return;

            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && currentLane > 0) {
                currentLane--;
                targetX = LANES[currentLane];
            }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && currentLane < 2) {
                currentLane++;
                targetX = LANES[currentLane];
            }
            if ((e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && !isJumping) {
                isJumping = true;
                jumpVelocity = jumpStrength;
            }
        }

        function spawnEntities() {
            minObstacleInterval = Math.max(18, 40 - Math.floor(score / 300));
            
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer > minObstacleInterval) {
                if (Math.random() < 0.7) { 
                    const randLane = Math.floor(Math.random() * 3);
                    const isTall = Math.random() < 0.3; 
                    
                    const geo = isTall ? new THREE.BoxGeometry(2, 3, 1.5) : new THREE.BoxGeometry(2, 1.2, 1.5);
                    const mat = new THREE.MeshStandardMaterial({ color: 0xff4757, roughness: 0.4 });
                    const obs = new THREE.Mesh(geo, mat);
                    
                    obs.position.set(LANES[randLane], isTall ? 1.5 : 0.6, -100);
                    obs.castShadow = true;
                    obs.isTall = isTall;
                    
                    scene.add(obs);
                    obstacles.push(obs);
                    obstacleSpawnTimer = 0;
                }
            }

            if (currentCoinBurst > 0) {
                coinSpawnTimer++;
                if (coinSpawnTimer > 4) { 
                    const coinGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.15, 12);
                    const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.0, roughness: 0.2 });
                    const coin = new THREE.Mesh(coinGeo, coinMat);
                    
                    coin.rotation.x = Math.PI / 2; 
                    coin.position.set(LANES[burstLane], 0.7, -100);
                    coin.castShadow = true;
                    
                    scene.add(coin);
                    activeCoins.push(coin);
                    
                    currentCoinBurst--;
                    coinSpawnTimer = 0;
                }
            } else {
                if (Math.random() < 0.02) {
                    currentCoinBurst = Math.floor(Math.random() * 4) + 3; 
                    burstLane = Math.floor(Math.random() * 3);
                    coinSpawnTimer = 0;
                }
            }
        }

        function updatePhysics() {
            // Linear lane changing interpolation for the player
            player.position.x += (targetX - player.position.x) * 0.25;

            // --- Updated Camera Tracking System ---
            // Interpolate camera X position toward the player's active X position
            camera.position.x += (player.position.x - camera.position.x) * 0.15; 
            
            // Lock camera look-at targets dynamically relative to its horizontal shift frame
            camera.lookAt(camera.position.x, 1.5, -5);

            // Jump Physics arc handler
            if (isJumping) {
                player.position.y += jumpVelocity;
                jumpVelocity -= gravity;
                
                if (player.position.y <= 0.9) {
                    player.position.y = 0.9;
                    isJumping = false;
                    jumpVelocity = 0;
                }
            }

            if (gameSpeed < maxSpeed) {
                gameSpeed += speedAcceleration;
            }

            trackSegments.forEach(seg => {
                seg.position.z += gameSpeed;
                if (seg.position.z > 30) {
                    seg.position.z -= 160; 
                }
            });

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += gameSpeed;

                if (Math.abs(obs.position.z - player.position.z) < 1.0) {
                    if (Math.abs(obs.position.x - player.position.x) < 1.0) {
                        const pBottom = player.position.y - 0.9;
                        const obsTop = obs.position.y + (obs.geometry.parameters.height / 2);
                        
                        if (pBottom < obsTop) {
                            gameOver();
                            return;
                        }
                    }
                }

                if (obs.position.z > 10) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }

			coinSpin += 0.07;
            for (let i = activeCoins.length - 1; i >= 0; i--) {
                let coin = activeCoins[i];
                coin.position.z += gameSpeed;
                
                coin.rotation.z = coinSpin;

                if (Math.abs(coin.position.z - player.position.z) < 0.9) {
                    if (Math.abs(coin.position.x - player.position.x) < 0.9) {
                        if (player.position.y - 0.9 < coin.position.y && player.position.y + 0.9 > coin.position.y) {
                            coins++;
                            score += 100; 
                            document.getElementById('coin-count').innerText = coins;
                            scene.remove(coin);
                            activeCoins.splice(i, 1);
                            continue;
                        }
                    }
                }

                if (coin.position.z > 10) {
                    scene.remove(coin);
                    activeCoins.splice(i, 1);
                }
            }

            score += gameSpeed * 0.5;
            document.getElementById('score-val').innerText = Math.floor(score);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                spawnEntities();
                updatePhysics();
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = () => {
            initEngine();
            animate();
        };
    </script>
